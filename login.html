<!DOCTYPE html>
<html lang="en" data-theme="cupcake">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker | Login Page</title>

    <link rel="preload" href="./fonts/Montserrat/Montserrat-Regular.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="./src/style.css">
    <link rel="stylesheet" href="./fonts/font.css">
    <link rel="stylesheet" href="./src/twOutput.css">
    <link rel="shortcut icon" href="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: var(--font-mont);
        }
    </style>
</head>
<body class="relative flex-center-col min-h-screen">
    <div class="my-auto border border-white rounded-2xl shadow-(--loginShadow) flex-center-col gap-6 p-8">
        <header class="flex-center-col-y gap-6">

            <!-- theme switch -->
            <button id="theme-btn" class="w-fit h-fit absolute text-center cursor-pointer top-5 right-5 bg-(--text2) rounded-full px-0.5"><i id="theme-icon" class="fas fa-sun text-yellow-200"></i></button>

            <img src="./B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="GittuHub Logo" class="w-25 h-25">
            <div class="flex-center-col-y gap-1">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="sub">Sign in to manage your issues</p>
            </div>
        </header>
        
        <main class="flex-center-col-y gap-6">
            <div class="flex-center-col-y gap-6">
                <div id="input-fields" class="flex-y gap-6">
                    <div class="username-div flex-y">
                        <label for="username" class="font-bold mb-2">Username</label>
                        <input id="username" type="text" placeholder="Enter your username" class="w-[26.5vw] border border-(--input-border) rounded-lg px-2 py-4 mb-1.5">
                        <short class="text-sm text-(--text2)">Default: octocat</short>
                    </div>
                    <div class="password-div flex-y">
                        <label for="password" class="font-bold mb-2">Password</label>
                        <input id="password" type="password" placeholder="Enter your password" class="w-[26.5vw] border border-(--input-border) rounded-lg px-2 py-4 mb-1.5">
                        <short class="text-sm text-(--text2)">Default: github123</short>
                    </div>
                    <button id="sign-in-btn" class="cursor-pointer btn btn-primary">Sign In</button>
                    <div class="flex-center-row-y gap-2">
                        <hr class="text-(--input-border) flex-1">
                        <span class="font-normal">OR</span>
                        <hr class="text-(--input-border) flex-1">
                    </div>
                    <short class="text-sm text-(--grey) text-center">Demo Credentials:</short>
                    <div class="flex-center-col-y p-6">
                        <span class="font-bold">Username: <span class="font-normal">octocat</span></span>
                        <span class="font-bold">Password: <span class="font-normal">github123</span></span>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
<script src="./src/login.js"></script>
</html>
